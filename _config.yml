# About Section
about_title: About Me
about_profile_image: /assets/profile.jpg
about_content: |
  10년 이상 Android 앱 개발을 수행한 Android Software Engineer입니다. Java 기반 Android Native 개발로 시작해 Kotlin, Coroutine, Flow/StateFlow, Jetpack Compose, Ktor, MVI, DI 구조 전환까지 실무에 적용해 왔습니다.

  실서비스의 <mark>유지보수성</mark>, <mark>안정성</mark>, <mark>사용자 경험</mark>을 개선하는 방향으로 기술을 적용하는 것을 중요하게 생각합니다. 최근에는 디저트39 오더앱, 가맹점 운영 앱, AI Helper, Android TV DID 앱을 중심으로 서비스 앱 개발과 구조 개선을 담당했고, 사이드 프로젝트에서는 KMP/CMP 기반 클라이언트 구조를 적용하고 있습니다.

